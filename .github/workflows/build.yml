name: Build Bundles

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        required: true
        type: string

jobs:
  build:
    name: Build on ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:modules

      - name: Build application bundles
        run: pnpm make

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ inputs.runner }}
          path: out/make/**
          if-no-files-found: error
